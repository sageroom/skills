name: shell-pane tests

on:
  push:
    paths:
      - 'shell-pane/**'
      - '.github/workflows/shell-pane-tests.yml'
  pull_request:
    paths:
      - 'shell-pane/**'
      - '.github/workflows/shell-pane-tests.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check all scripts (bash -n)
        run: |
          set -e
          for f in shell-pane/*.sh shell-pane/tests/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: shellcheck (non-blocking)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          # SC1091: helpers source _pane-lib.sh via a runtime-resolved path.
          shellcheck -e SC1091 shell-pane/*.sh shell-pane/tests/*.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux and procps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux procps

      - name: Run shell-pane integration tests
        run: bash shell-pane/tests/test-shell-pane.sh
